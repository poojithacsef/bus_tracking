<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Bus Tracker</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="status-box">
        <h2 class="text-center">🎓 Student Tracker</h2>
        
        <div class="mb-3">
            <label for="busId" class="form-label fw-bold">Select a Bus to Track:</label>
            <select id="busId" class="form-select">
                <option value="" selected>-- Please select a bus --</option>
                <!-- Options will be generated by JavaScript -->
            </select>
        </div>

        <div id="statusMessage" class="alert alert-info" role="alert">
            Please select a bus to begin tracking.
        </div>

        <!-- Map Container -->
        <div id="map"></div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Main Logic -->
<script type="module">
    import { database } from './firebase-config.js';
    import { initMap, trackBus } from './map.js';

    // --- Populate Bus Numbers ---
    const busSelect = document.getElementById('busId');
    for (let i = 1; i <= 100; i++) {
        const option = document.createElement('option');
        option.value = `bus${i}`;
        option.textContent = `Bus ${i}`;
        busSelect.appendChild(option);
    }
    // --- End Population ---

    // Initialize map immediately
    initMap('map', [16.9891, 82.2475], 13);

    const statusMessage = document.getElementById('statusMessage');

    // Callback function to handle status updates from the map module
    function handleStatusUpdate(message) {
        if (message) {
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
        } else {
            statusMessage.style.display = 'none';
        }
    }

    busSelect.addEventListener('change', () => {
        const busId = busSelect.value;
        const selectedBusText = busSelect.options[busSelect.selectedIndex].text;
        
        trackBus(busId, selectedBusText, handleStatusUpdate);
    });
</script>

</body>
</html>
