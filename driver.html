<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - Bus Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="status-box text-center">
        <h2>🚌 Driver Dashboard</h2>
        <p class="text-muted">Select bus and toggle sharing.</p>
        
        <select id="busId" class="form-select big-select">
            <!-- Options will be generated by JavaScript -->
        </select>

        <button id="toggleBtn" class="btn btn-success big-btn w-100">
            Start Sharing Location
        </button>
        
        <div id="statusText" class="status-indicator text-danger">
            Stopped
        </div>
    </div>
</div>

<!-- Main Logic -->
<script type="module">
    import { database } from './firebase-config.js';
    import { ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- Populate Bus Numbers ---
    const busSelect = document.getElementById('busId');
    for (let i = 1; i <= 100; i++) {
        const option = document.createElement('option');
        option.value = `bus${i}`;
        option.textContent = `Bus ${i}`;
        busSelect.appendChild(option);
    }
    // --- End Population ---

    let watchId = null;
    let intervalId = null;
    let currentLat = null;
    let currentLng = null;
    let isSharing = false;

    const toggleBtn = document.getElementById('toggleBtn');
    const statusText = document.getElementById('statusText');

    toggleBtn.addEventListener('click', () => {
        if (!isSharing) {
            startSharing();
        } else {
            stopSharing();
        }
    });

    function startSharing() {
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser.");
            return;
        }

        // Update UI
        isSharing = true;
        busSelect.disabled = true;
        toggleBtn.textContent = "Stop Sharing";
        toggleBtn.classList.replace('btn-success', 'btn-danger');
        statusText.textContent = "Location Sharing Active";
        statusText.classList.replace('text-danger', 'text-success');

        // Start watching position (updates local variables)
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                currentLat = position.coords.latitude;
                currentLng = position.coords.longitude;
            },
            (error) => {
                console.error("GPS Error:", error);
                statusText.textContent = "GPS Error: " + error.message;
            },
            { enableHighAccuracy: true }
        );

        // Send to Firebase every 5 seconds
        intervalId = setInterval(() => {
            if (currentLat !== null && currentLng !== null) {
                const busId = busSelect.value;
                set(ref(database, 'buses/' + busId), {
                    lat: currentLat,
                    lng: currentLng,
                    timestamp: Date.now()
                }).catch((error) => {
                    console.error("Firebase Error:", error);
                });
            }
        }, 5000);
    }

    function stopSharing() {
        // Stop tracking
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (intervalId) clearInterval(intervalId);
        
        watchId = null;
        intervalId = null;
        currentLat = null;
        currentLng = null;

        // Reset UI
        isSharing = false;
        busSelect.disabled = false;
        toggleBtn.textContent = "Start Sharing Location";
        toggleBtn.classList.replace('btn-danger', 'btn-success');
        statusText.textContent = "Stopped";
        statusText.classList.replace('text-success', 'text-danger');
    }
</script>

</body>
</html>
